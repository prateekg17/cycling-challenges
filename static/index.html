<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prateek's Cycling Challenges</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚴</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@300;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-content">
            <h1 class="site-title">Prateek's Cycling Challenges</h1>
            <a class="follow-strava" href="https://www.strava.com/athletes/111956132" target="_blank" rel="noopener noreferrer" aria-label="Follow me on Strava">
                <img src="follow-me-on-strava.png" alt="Follow me on Strava" />
            </a>
        </div>
    </header>

    <!-- Home screen: challenge tile grid -->
    <main id="home-screen" hidden>
        <!-- Populated by renderHomeScreen() in script.js -->
    </main>

    <!-- Challenge detail: back-link row (shown only in detail view) -->
    <div id="challenge-detail-nav" class="challenge-tabs" role="navigation" aria-label="Challenge navigation" hidden>
        <div class="challenge-tabs-inner">
            <div class="challenge-detail-header">
                <button type="button" class="back-link" id="back-to-challenges">&#8592; All Challenges</button>
                <span class="detail-header-sep">|</span>
                <span class="challenge-detail-title" id="challenge-detail-title"></span>
            </div>
            <div class="challenge-tabs-list" style="display:none;"></div>
            <span class="view-toggle"><button type="button" id="toggle-table-view"></button></span>
        </div>
    </div>

    <!-- Challenge detail: activity content -->
    <main id="challenge-detail" hidden>
        <section id="activities" style="margin-top:2em;"></section>
        <section id="table-view" style="margin-top:2em;"></section>
    </main>

    <footer class="site-footer">
        <div class="site-footer-content">
            <span class="site-footer-attribution">Built by Prateek Gupta</span>
            <a class="github-link" href="https://github.com/prateekg17/cycling-challenges" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub (opens in a new tab)">
                <svg class="github-icon" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/></svg>
                View on GitHub
            </a>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
